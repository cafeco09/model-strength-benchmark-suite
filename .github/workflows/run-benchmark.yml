name: Run benchmark scaffold

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run model scaffold
        run: |
          python src/run_models.py

      - name: Calculate placeholder scores
        run: |
          python src/calculate_scores.py
          python src/generate_strength_cards.py

      - name: Commit generated results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add results/
          git commit -m "Update benchmark placeholder results" || echo "No changes to commit"
          git push
